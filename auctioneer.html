<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Auctioneer Control | DK's Badminton Auction</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      padding: 20px;
      color: #fff;
      position: relative;
      overflow-x: hidden;
      background: #0a0a0f;
    }

    /* Animated Background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        linear-gradient(125deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1a 100%),
        repeating-linear-gradient(45deg, rgba(0, 212, 255, 0.02) 0px, rgba(0, 212, 255, 0.02) 2px, transparent 2px, transparent 8px);
      z-index: -2;
    }

    /* Background Blobs */
    .bg-blobs {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .bg-blobs div {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.2;
      animation: floatBlob 20s infinite ease-in-out;
    }

    .bg-blobs div:nth-child(1) {
      background: #ff6a00;
      top: -150px;
      left: -150px;
      animation-delay: 0s;
    }

    .bg-blobs div:nth-child(2) {
      background: #00d4ff;
      bottom: -150px;
      right: -150px;
      animation-delay: -7s;
    }

    .bg-blobs div:nth-child(3) {
      background: #7cff8f;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -14s;
    }

    @keyframes floatBlob {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(50px, -50px) scale(1.1); }
      66% { transform: translate(-30px, 30px) scale(0.9); }
    }

    .wrap {
      max-width: 1200px;
      margin: auto;
      position: relative;
      z-index: 1;
    }

    /* Top Bar */
    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 30px;
      padding: 20px;
      background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(0,0,0,0.5));
      backdrop-filter: blur(20px);
      border-radius: 20px;
      border-left: 4px solid #00d4ff;
      animation: slideInLeft 0.6s ease-out;
    }

    @keyframes slideInLeft {
      from {
        opacity: 0;
        transform: translateX(-50px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .top h1 {
      font-size: 2rem;
      font-family: 'Orbitron', monospace;
      background: linear-gradient(135deg, #00d4ff, #7cff8f);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 6px;
    }

    .top p {
      color: #c9d2e5;
      font-size: 0.9rem;
    }

    .back {
      color: #111;
      text-decoration: none;
      background: linear-gradient(135deg, #ff6a00, #ff8c42);
      padding: 12px 24px;
      border-radius: 50px;
      font-weight: bold;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(255, 106, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .back::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }

    .back:hover::before {
      left: 100%;
    }

    .back:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 106, 0, 0.5);
    }

    /* Cards */
    .card {
      background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(20,20,40,0.7));
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 212, 255, 0.3);
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
      margin-bottom: 20px;
      transition: all 0.3s ease;
      animation: fadeInUp 0.6s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .card:hover {
      transform: translateY(-5px);
      border-color: rgba(0, 212, 255, 0.6);
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    /* Form Elements - FIXED DROPDOWN STYLES */
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #7cff8f;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
    }

    select, input {
      width: 100%;
      padding: 12px 15px;
      border-radius: 12px;
      border: 2px solid rgba(0, 212, 255, 0.3);
      background: rgba(20, 20, 40, 0.9);
      color: #fff;
      outline: none;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      cursor: pointer;
    }

    /* Dropdown specific styles */
    select {
      appearance: none;
      -webkit-appearance: none;
      -moz-appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2300d4ff' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'></polyline></svg>");
      background-repeat: no-repeat;
      background-position: right 15px center;
      background-size: 16px;
      padding-right: 40px;
    }

    select option {
      background: #1a1a2e;
      color: #fff;
      padding: 12px;
      font-size: 0.95rem;
    }

    select option:hover {
      background: #00d4ff;
      color: #111;
    }

    select:focus, input:focus {
      border-color: #00d4ff;
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
      transform: translateY(-2px);
    }

    select:hover, input:hover {
      border-color: rgba(0, 212, 255, 0.6);
    }

    /* Buttons */
    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    button {
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      font-family: 'Orbitron', monospace;
      font-size: 0.9rem;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
      transition: left 0.5s;
    }

    button:hover::before {
      left: 100%;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
    }

    .btn1 {
      background: linear-gradient(135deg, #ff6a00, #ff8c42);
      color: #fff;
      box-shadow: 0 4px 15px rgba(255, 106, 0, 0.3);
    }

    .btn2 {
      background: linear-gradient(135deg, #00d4ff, #7cff8f);
      color: #111;
      box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
    }

    .btn3 {
      background: linear-gradient(135deg, #ff5f6d, #ffc371);
      color: #111;
      box-shadow: 0 4px 15px rgba(255, 95, 109, 0.3);
    }

    /* Stats */
    .stat {
      font-size: 1.1rem;
      margin-top: 12px;
      padding: 12px 15px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 10px;
      border-left: 3px solid #00d4ff;
      transition: all 0.3s ease;
    }

    .stat:hover {
      background: rgba(0, 212, 255, 0.1);
      transform: translateX(5px);
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 15px;
      font-family: 'Orbitron', monospace;
      color: #00d4ff;
    }

    /* Live Indicator */
    .live-indicator {
      position: fixed;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, #ff6a00, #ff8c42);
      padding: 6px 15px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 1px;
      animation: blink 1s ease-in-out infinite;
      z-index: 1000;
      font-family: 'Orbitron', monospace;
      color: #fff;
    }

    @keyframes blink {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.7;
        transform: scale(1.05);
      }
    }

    /* Status Badge */
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: bold;
      margin-left: 10px;
    }

    .status-running {
      background: rgba(0, 212, 255, 0.3);
      color: #00d4ff;
      animation: pulse 1s ease-in-out infinite;
    }

    .status-paused {
      background: rgba(255, 106, 0, 0.3);
      color: #ff8c42;
    }

    .status-sold {
      background: rgba(124, 255, 143, 0.3);
      color: #7cff8f;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Timer Special */
    .timer-value {
      font-size: 1.3rem;
      font-weight: bold;
      color: #ffd36a;
      font-family: 'Orbitron', monospace;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .wrap {
        padding: 0;
      }
      
      .top {
        flex-direction: column;
        text-align: center;
      }
      
      .top h1 {
        font-size: 1.5rem;
      }
      
      .card {
        padding: 20px;
      }
      
      button {
        padding: 10px 18px;
        font-size: 0.85rem;
      }
      
      .row {
        gap: 10px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 15px;
      }
      
      .grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }
      
      .stat {
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>
  <audio id="startSound" src="start.mp3"></audio>
  <audio id="soldSound" src="sold.mp3"></audio>

  <div class="bg-blobs">
    <div></div>
    <div></div>
    <div></div>
  </div>

  <div class="live-indicator">🎤 AUCTIONEER CONTROL</div>

  <div class="wrap">
    <div class="top">
      <div>
        <h1>🎤 AUCTIONEER CONTROL</h1>
        <p>Run the live auction from here | Sports Broadcast System</p>
      </div>
      <a class="back" href="index.html">← BACK TO HOME</a>
    </div>

    <div class="card">
      <div class="grid">
        <div>
          <label for="playerSelect">🏸 SELECT PLAYER</label>
          <select id="playerSelect">
            <option value="">📋 Loading players...</option>
          </select>
        </div>
      </div>

      <div class="row">
        <button class="btn1" id="startBtn">🎬 START AUCTION</button>
        <button class="btn2" id="pauseBtn">⏸️ PAUSE AUCTION</button>
        <button class="btn2" id="nextBtn">⏭️ NEXT PLAYER</button>
        <button class="btn1" id="soldBtn">✅ MARK SOLD</button>
        <button class="btn3" id="unsoldBtn">❌ MARK UNSOLD</button>
      </div>
    </div>

    <div class="card">
      <h2>📡 LIVE AUCTION STATUS</h2>
      <div class="stat" id="statusText">Loading...</div>
      <div class="stat" id="currentPlayerText">👤 Player: -</div>
      <div class="stat" id="bidText">💰 Current Bid: ₹0</div>
      <div class="stat" id="teamText">🏢 Highest Bidder: -</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      addDoc,
      doc,
      getDoc,
      updateDoc,
      onSnapshot,
      query,
      where,
      arrayUnion
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBRAFSEKVsDpCQLYhyu3DbCJ7-fjpegChE",
      authDomain: "badminton-auction-46109.firebaseapp.com",
      projectId: "badminton-auction-46109",
      storageBucket: "badminton-auction-46109.firebasestorage.app",
      messagingSenderId: "365770814132",
      appId: "1:365770814132:web:aeb57e14d2c516ecaa9de1"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const playerSelect = document.getElementById("playerSelect");

    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const nextBtn = document.getElementById("nextBtn");
    const soldBtn = document.getElementById("soldBtn");
    const unsoldBtn = document.getElementById("unsoldBtn");

    const startSound = document.getElementById("startSound");
    const soldSound = document.getElementById("soldSound");

    const statusText = document.getElementById("statusText");
    const currentPlayerText = document.getElementById("currentPlayerText");
    const bidText = document.getElementById("bidText");
    const teamText = document.getElementById("teamText");

    let players = [];

    async function loadPlayers() {
      const snap = await getDocs(collection(db, "players"));
      players = [];
      playerSelect.innerHTML = '<option value="">🎯 Select a Player</option>';

      snap.forEach((docSnap) => {
        const data = docSnap.data();
        if (data.status !== "sold") {
          players.push({ id: docSnap.id, ...data });
          const opt = document.createElement("option");
          opt.value = docSnap.id;
          opt.textContent = `🏸 ${data.name} - ₹${Number(data.basePrice || 0).toLocaleString("en-IN")}`;
          playerSelect.appendChild(opt);
        }
      });

      if (players.length === 0) {
        playerSelect.innerHTML = '<option value="">⚠️ No players available</option>';
      }
    }

    function getNextPlayerId() {
      if (!players.length) return "";
      const currentId = playerSelect.value;
      const currentIndex = players.findIndex(p => p.id === currentId);
      const nextIndex = currentIndex >= 0 && currentIndex < players.length - 1 ? currentIndex + 1 : 0;
      return players[nextIndex]?.id || "";
    }

    async function getPlayerName(playerId) {
      if (!playerId) return "-";
      const p = players.find(x => x.id === playerId);
      if (p) return p.name;
      const snap = await getDoc(doc(db, "players", playerId));
      return snap.exists() ? snap.data().name : "-";
    }

    startBtn.addEventListener("click", async () => {
      if (!playerSelect.value) {
        alert("⚠️ Select a player first");
        return;
      }

      startSound.currentTime = 0;
      startSound.play().catch(() => {});

      const chosen = players.find(p => p.id === playerSelect.value);

      await updateDoc(doc(db, "auction", "current"), {
        playerId: playerSelect.value,
        currentBid: Number(chosen?.basePrice || 0),
        highestBidder: "",
        status: "running",
        lastBidTime: 0
      });
    });

    pauseBtn.addEventListener("click", async () => {
      await updateDoc(doc(db, "auction", "current"), {
        status: "paused"
      });
    });

    nextBtn.addEventListener("click", async () => {
      const nextId = getNextPlayerId();
      if (!nextId) {
        alert("❌ No players available");
        return;
      }

      playerSelect.value = nextId;
      const chosen = players.find(p => p.id === nextId);

      await updateDoc(doc(db, "auction", "current"), {
        playerId: nextId,
        currentBid: Number(chosen?.basePrice || 0),
        highestBidder: "",
        status: "running",
        lastBidTime: 0
      });
    });

    soldBtn.addEventListener("click", async () => {
      try {
        const auctionRef = doc(db, "auction", "current");
        const auctionSnap = await getDoc(auctionRef);

        if (!auctionSnap.exists()) {
          alert("❌ Auction document not found");
          return;
        }

        const auction = auctionSnap.data();

        if (!auction.playerId) {
          alert("❌ No current player selected");
          return;
        }

        if (!auction.highestBidder) {
          alert("⚠️ No team has placed a bid yet");
          return;
        }

        soldSound.currentTime = 0;
        soldSound.play().catch(() => {});

        const finalBid = Number(auction.currentBid || 0);
        const highestBidderName = auction.highestBidder;
        const playerId = auction.playerId;

        const playerSnap = await getDoc(doc(db, "players", playerId));
        if (!playerSnap.exists()) {
          alert("❌ Player not found");
          return;
        }
        const playerData = playerSnap.data();

        const teamQuery = query(
          collection(db, "teams"),
          where("name", "==", highestBidderName)
        );

        const teamSnap = await getDocs(teamQuery);

        if (teamSnap.empty) {
          alert("❌ Winning team not found in database");
          return;
        }

        const winningTeamDoc = teamSnap.docs[0];
        const winningTeamRef = doc(db, "teams", winningTeamDoc.id);
        const winningTeamData = winningTeamDoc.data();

        const oldBudget = Number(winningTeamData.budget || 0);
        const newBudget = oldBudget - finalBid;

        if (newBudget < 0) {
          alert("⚠️ Team budget is not enough");
          return;
        }

        await updateDoc(doc(db, "players", playerId), {
          status: "sold",
          currentBid: finalBid
        });

        await updateDoc(winningTeamRef, {
          budget: newBudget,
          playersBought: arrayUnion(playerId)
        });

        await addDoc(collection(db, "soldPlayers"), {
          playerId: playerId,
          playerName: playerData.name || "",
          teamName: highestBidderName,
          amount: finalBid,
          category: playerData.category || "",
          image: playerData.image || "",
          soldAt: Date.now()
        });

        await updateDoc(auctionRef, {
          status: "sold"
        });

        alert(`✅ Player sold to ${highestBidderName} for ₹${finalBid.toLocaleString("en-IN")}`);
        await loadPlayers();

      } catch (error) {
        alert("❌ SOLD action failed: " + error.message);
      }
    });

    unsoldBtn.addEventListener("click", async () => {
      try {
        const auctionRef = doc(db, "auction", "current");
        const auctionSnap = await getDoc(auctionRef);
        const auction = auctionSnap.data();

        if (!auction?.playerId) {
          alert("❌ No current player");
          return;
        }

        const playerSnap = await getDoc(doc(db, "players", auction.playerId));
        const playerData = playerSnap.exists() ? playerSnap.data() : null;

        await updateDoc(doc(db, "players", auction.playerId), {
          status: "unsold",
          currentBid: Number(playerData?.basePrice || 0)
        });

        await updateDoc(auctionRef, {
          status: "stopped",
          highestBidder: "",
          currentBid: Number(playerData?.basePrice || 0),
          timer: 0,
          lastBidTime: 0
        });

        alert("⚠️ Player marked as UNSOLD");
      } catch (error) {
        alert("❌ UNSOLD action failed: " + error.message);
      }
    });

    onSnapshot(doc(db, "auction", "current"), async (snap) => {
      const data = snap.data();
      if (!data) return;

      let statusDisplay = data.status || "-";
      let statusClass = "";
      
      if (statusDisplay === "running") {
        statusClass = "status-running";
        statusDisplay = "🔴 RUNNING";
      } else if (statusDisplay === "paused") {
        statusClass = "status-paused";
        statusDisplay = "⏸️ PAUSED";
      } else if (statusDisplay === "sold") {
        statusClass = "status-sold";
        statusDisplay = "✅ SOLD";
      } else {
        statusDisplay = "⏹️ " + statusDisplay.toUpperCase();
      }
      
      statusText.innerHTML = `📊 Status: <span class="status-badge ${statusClass}">${statusDisplay}</span>`;
      currentPlayerText.innerHTML = `👤 Player: <strong>${await getPlayerName(data.playerId)}</strong>`;
      bidText.innerHTML = `💰 Current Bid: <strong style="color: #ffd36a;">₹${Number(data.currentBid || 0).toLocaleString("en-IN")}</strong>`;

      if (data.status === "sold") {
        teamText.innerHTML = `🏆 Sold To: <strong style="color: #7cff8f;">${data.highestBidder || "-"}</strong>`;
      } else {
        teamText.innerHTML = `🏢 Highest Bidder: <strong style="color: #00d4ff;">${data.highestBidder || "-"}</strong>`;
      }
    });

    loadPlayers();
  </script>
</body>
</html>
