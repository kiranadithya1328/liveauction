<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Auctioneer Login | DK's Badminton Auction</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;800;900&family=Poppins:wght@300;400;500;600;700;800&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
      background: #0a0a0f;
    }

    /* Animated Background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        linear-gradient(125deg, #0a0a0f 0%, #1a1a2e 50%, #0f0f1a 100%),
        repeating-linear-gradient(45deg, rgba(0, 212, 255, 0.02) 0px, rgba(0, 212, 255, 0.02) 2px, transparent 2px, transparent 8px);
      z-index: -2;
    }

    /* Background Blobs */
    .bg-blobs {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: -1;
    }

    .bg-blobs div {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.3;
      animation: floatBlob 20s infinite ease-in-out;
    }

    .bg-blobs div:nth-child(1) {
      background: #00d4ff;
      top: -150px;
      left: -150px;
      animation-delay: 0s;
    }

    .bg-blobs div:nth-child(2) {
      background: #7cff8f;
      bottom: -150px;
      right: -150px;
      animation-delay: -7s;
    }

    .bg-blobs div:nth-child(3) {
      background: #ff0080;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -14s;
      width: 500px;
      height: 500px;
    }

    @keyframes floatBlob {
      0%, 100% {
        transform: translate(0, 0) scale(1);
      }
      33% {
        transform: translate(50px, -50px) scale(1.1);
      }
      66% {
        transform: translate(-30px, 30px) scale(0.9);
      }
    }

    /* Login Box */
    .login-box {
      width: 100%;
      max-width: 450px;
      background: linear-gradient(135deg, rgba(0,0,0,0.85), rgba(20,20,40,0.85));
      backdrop-filter: blur(20px);
      border: 2px solid rgba(0, 212, 255, 0.4);
      border-radius: 25px;
      padding: 40px 32px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 30px rgba(0, 212, 255, 0.3);
      animation: fadeInUp 0.8s ease-out, borderPulse 3s ease-in-out infinite;
      position: relative;
      overflow: hidden;
      transition: all 0.4s ease;
    }

    .login-box::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(0, 212, 255, 0.1), transparent);
      transform: rotate(45deg);
      animation: shimmer 4s infinite;
    }

    @keyframes shimmer {
      0% {
        transform: translateX(-100%) rotate(45deg);
      }
      100% {
        transform: translateX(100%) rotate(45deg);
      }
    }

    @keyframes borderPulse {
      0%, 100% {
        box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 20px rgba(0, 212, 255, 0.3);
        border-color: rgba(0, 212, 255, 0.4);
      }
      50% {
        box-shadow: 0 25px 50px rgba(0,0,0,0.5), 0 0 40px rgba(0, 212, 255, 0.6);
        border-color: rgba(0, 212, 255, 0.8);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-box:hover {
      transform: translateY(-5px);
      box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 50px rgba(0, 212, 255, 0.5);
    }

    /* Header */
    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-icon {
      width: 90px;
      height: 90px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #00d4ff, #7cff8f);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      animation: pulseIcon 2s ease-in-out infinite;
      box-shadow: 0 0 30px rgba(0, 212, 255, 0.5);
    }

    @keyframes pulseIcon {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 40px rgba(0, 212, 255, 0.8);
      }
    }

    h2 {
      font-size: 2.2rem;
      font-family: 'Orbitron', monospace;
      background: linear-gradient(135deg, #00d4ff, #7cff8f);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .subtitle {
      color: #c9d2e5;
      font-size: 0.9rem;
      margin-top: 5px;
    }

    /* Input Fields */
    .input-group {
      margin-bottom: 20px;
      animation: slideInRight 0.6s ease-out;
      animation-fill-mode: both;
    }

    .input-group:nth-child(1) {
      animation-delay: 0.1s;
    }

    .input-group:nth-child(2) {
      animation-delay: 0.2s;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #7cff8f;
      font-size: 0.9rem;
      letter-spacing: 0.5px;
    }

    .input-wrapper {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.1rem;
    }

    input {
      width: 100%;
      padding: 14px 15px 14px 45px;
      border: 2px solid rgba(0, 212, 255, 0.3);
      outline: none;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-size: 1rem;
      transition: all 0.3s ease;
      font-family: 'Poppins', sans-serif;
    }

    input::placeholder {
      color: rgba(201, 210, 229, 0.6);
    }

    input:focus {
      border-color: #00d4ff;
      background: rgba(0, 212, 255, 0.1);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
      transform: translateY(-2px);
    }

    input:hover {
      border-color: rgba(0, 212, 255, 0.6);
    }

    /* Button */
    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      background: linear-gradient(135deg, #00d4ff, #7cff8f);
      color: #111;
      margin-top: 10px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      font-family: 'Orbitron', monospace;
      letter-spacing: 1px;
      animation: slideInRight 0.6s ease-out 0.3s both;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transition: left 0.5s;
    }

    button:hover::before {
      left: 100%;
    }

    button:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
    }

    button:active {
      transform: translateY(0);
    }

    /* Error Message */
    .error {
      margin-top: 20px;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255, 95, 109, 0.2);
      color: #ffb4bc;
      border: 1px solid rgba(255, 95, 109, 0.4);
      display: none;
      text-align: center;
      font-size: 0.9rem;
      animation: shake 0.5s ease;
    }

    @keyframes shake {
      0%, 100% {
        transform: translateX(0);
      }
      10%, 30%, 50%, 70%, 90% {
        transform: translateX(-5px);
      }
      20%, 40%, 60%, 80% {
        transform: translateX(5px);
      }
    }

    /* Back Link */
    .back-link {
      text-align: center;
      margin-top: 25px;
      animation: fadeIn 0.6s ease-out 0.4s both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .back-link a {
      color: #00d4ff;
      text-decoration: none;
      font-weight: 500;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .back-link a:hover {
      color: #7cff8f;
      transform: translateX(-5px);
    }

    /* Live Indicator */
    .live-indicator {
      position: fixed;
      top: 20px;
      right: 20px;
      background: linear-gradient(135deg, #00d4ff, #7cff8f);
      padding: 6px 15px;
      border-radius: 50px;
      font-size: 0.8rem;
      font-weight: bold;
      letter-spacing: 1px;
      animation: blink 1s ease-in-out infinite;
      z-index: 1000;
      font-family: 'Orbitron', monospace;
      color: #111;
    }

    @keyframes blink {
      0%, 100% {
        opacity: 1;
        transform: scale(1);
      }
      50% {
        opacity: 0.7;
        transform: scale(1.05);
      }
    }

    /* Loading State */
    button.loading {
      position: relative;
      pointer-events: none;
      opacity: 0.8;
    }

    button.loading::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      top: 50%;
      left: 50%;
      margin-left: -10px;
      margin-top: -10px;
      border: 2px solid #111;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spinner 0.6s linear infinite;
    }

    @keyframes spinner {
      to {
        transform: rotate(360deg);
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .login-box {
        padding: 30px 24px;
        max-width: 400px;
      }

      h2 {
        font-size: 1.8rem;
      }

      .login-icon {
        width: 70px;
        height: 70px;
        font-size: 2.5rem;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 15px;
      }

      .login-box {
        padding: 25px 20px;
      }

      h2 {
        font-size: 1.6rem;
      }

      .login-icon {
        width: 60px;
        height: 60px;
        font-size: 2rem;
      }

      input {
        padding: 12px 15px 12px 40px;
      }

      button {
        padding: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-blobs">
    <div></div>
    <div></div>
    <div></div>
  </div>

  <div class="live-indicator">🎤 AUCTIONEER PORTAL</div>

  <div class="login-box">
    <div class="login-header">
      <div class="login-icon">
        🎤
      </div>
      <h2>AUCTIONEER LOGIN</h2>
      <p class="subtitle">Control the auction from here</p>
    </div>

    <div class="input-group">
      <label for="username">👤 USERNAME</label>
      <div class="input-wrapper">
        <span class="input-icon">👤</span>
        <input id="username" type="text" placeholder="Enter auctioneer username" autocomplete="off">
      </div>
    </div>

    <div class="input-group">
      <label for="password">🔒 PASSWORD</label>
      <div class="input-wrapper">
        <span class="input-icon">🔑</span>
        <input id="password" type="password" placeholder="Enter password">
      </div>
    </div>

    <button onclick="loginAuctioneer()" id="loginBtn">LOGIN →</button>

    <div id="errorMsg" class="error"></div>

    <div class="back-link">
      <a href="index.html">← BACK TO HOME</a>
    </div>
  </div>

  <script>
    async function loginAuctioneer() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorMsg = document.getElementById("errorMsg");
      const loginBtn = document.getElementById("loginBtn");

      errorMsg.style.display = "none";

      if (!username || !password) {
        errorMsg.textContent = "⚠️ Please enter username and password.";
        errorMsg.style.display = "block";
        
        // Shake animation for error
        const loginBox = document.querySelector(".login-box");
        loginBox.style.animation = "shake 0.5s ease";
        setTimeout(() => {
          loginBox.style.animation = "";
        }, 500);
        return;
      }

      // Show loading state
      const originalText = loginBtn.textContent;
      loginBtn.textContent = "AUTHENTICATING...";
      loginBtn.disabled = true;
      loginBtn.classList.add("loading");

      // Simulate network delay for better UX
      await new Promise(resolve => setTimeout(resolve, 800));

      if (username === "auctioneer" && password === "auction123") {
        // Success animation
        loginBtn.textContent = "✓ SUCCESS!";
        loginBtn.style.background = "linear-gradient(135deg, #7cff8f, #00d4ff)";
        
        setTimeout(() => {
          window.location.href = "auctioneer.html";
        }, 500);
      } else {
        loginBtn.textContent = originalText;
        loginBtn.disabled = false;
        loginBtn.classList.remove("loading");
        errorMsg.textContent = "❌ Invalid auctioneer credentials. Please try again.";
        errorMsg.style.display = "block";
        
        // Shake animation for error
        const loginBox = document.querySelector(".login-box");
        loginBox.style.animation = "shake 0.5s ease";
        setTimeout(() => {
          loginBox.style.animation = "";
        }, 500);
        
        // Clear input fields on error
        document.getElementById("password").value = "";
        document.getElementById("password").focus();
      }
    }

    // Add enter key support
    document.getElementById("password").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        loginAuctioneer();
      }
    });

    document.getElementById("username").addEventListener("keypress", function(event) {
      if (event.key === "Enter") {
        loginAuctioneer();
      }
    });
  </script>
</body>
</html>
